name: CI/CD

on:
    push:
        branches: [ main ]

jobs:
    ci-cd:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  pip install -r requirements.txt
                  pip install flake8 pytest joblib numpy

            - name: Lint with flake8
              run: flake8 noshow_iq/ --max-line-length=88 --ignore=E501

            - name: Create dummy model for testing
              # This creates a fake model class that mimics Scikit-Learn
              # It prevents the 'list object has no attribute predict_proba' error
              run: |
                  python -c "
                  import joblib
                  import numpy as np
                  class MockModel:
                      def predict(self, X): return np.array([0])
                      def predict_proba(self, X): return np.array([[0.8, 0.2]])
                  joblib.dump(MockModel(), 'noshow_iq/model.joblib')
                  "

            - name: Run pytest
              env:
                  # Uses the GitHub Secret for Mongo, or a fallback for testing
                  MONGO_URI: ${{ secrets.MONGO_URI || 'mongodb://localhost:27017/testdb' }}
              run: pytest tests/ -v

            - name: Login to Docker Hub
              if: success()
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: Build and Push Docker image
              if: success()
              run: |
                  docker build -t ${{ secrets.DOCKER_USERNAME }}/noshow-iq:latest .
                  docker push ${{ secrets.DOCKER_USERNAME }}/noshow-iq:latest
