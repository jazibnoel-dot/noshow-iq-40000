name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest joblib numpy

      - name: Lint with flake8
        # We use --exit-zero temporarily so you can get the push working 
        # even if there are small spacing errors.
        run: flake8 noshow_iq/ --max-line-length=88 --ignore=E501 --exit-zero

      - name: Run pytest
        env:
          MONGO_URI: ${{ secrets.MONGO_URI || 'mongodb://localhost:27017/testdb' }}
        run: pytest tests/ -v

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker image
        if: success()
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/noshow-iq:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/noshow-iq:latest
