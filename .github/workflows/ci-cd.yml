name: CI/CD

on:
  push:
    branches: [main]

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 noshow_iq/ --max-line-length=88 --ignore=E501

      - name: Run pytest
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t hamzamlops/noshow-iq:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push to Docker Hub
        run: docker push hamzamlops/noshow-iq:latest

      - name: Trigger Hugging Face rebuild
        run: |
          curl -X POST \
            "https://huggingface.co/api/spaces/hamzamlops/noshow-iq/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"