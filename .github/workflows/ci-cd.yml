name: CI/CD

on:
    push:
        branches: [ main ]

jobs:
    ci-cd:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  pip install -r requirements.txt
                  pip install flake8 pytest joblib  # Ensure these are available

            - name: Lint with flake8
              run: flake8 noshow_iq/ --max-line-length=88 --ignore=E501

            # THIS STEP IS CRITICAL: It fixes the FileNotFoundError
            - name: Create dummy model for testing
              run: |
                  python -c "import joblib; joblib.dump(lambda x: [0], 'noshow_iq/model.joblib')"

            - name: Run pytest
              env:
                  # Using a fallback string so tests don't crash if the secret isn't set yet
                  MONGO_URI: ${{ secrets.MONGO_URI || 'mongodb://localhost:27017/testdb' }}
              run: pytest tests/ -v

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}

            - name: Build and Push Docker image
              run: |
                  docker build -t ${{ secrets.DOCKER_USERNAME }}/noshow-iq:latest .
                  docker push ${{ secrets.DOCKER_USERNAME }}/noshow-iq:latest
